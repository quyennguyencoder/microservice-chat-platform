spring:
  application:
    name: conversation-service

  config:
    import: "optional:configserver:http://${CONFIG_SERVER_USERNAME:config}:${CONFIG_SERVER_PASSWORD:config}@${CONFIG_SERVER_HOST:localhost}:${CONFIG_SERVER_PORT:8888}"

eureka:
  client:
    serviceUrl:
      defaultZone: "http://${EUREKA_USERNAME:eureka}:${EUREKA_PASSWORD:eureka}@${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/"
  instance:
    prefer-ip-address: true
