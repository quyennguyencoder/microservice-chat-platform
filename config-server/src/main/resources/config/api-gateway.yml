server:
  port: 8080

spring:
  application:
    name: api-gateway

  http:
    codecs:
      max-in-memory-size: 16MB   # Increase if you expect large payloads

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOriginPatterns:
                  - "http://localhost:3000"
                  - "${FRONTEND_URL:http://localhost:3000}"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - PATCH
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true
                maxAge: 3600

          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin, RETAIN_UNIQUE

          httpclient:
            connect-timeout: 5000       # 5 seconds to connect
            response-timeout: 10s       # 10 seconds for full response
          
          routes:
            # ─── Auth Service ─────────────────────────────────────────
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**
#              filters:
#                - name: CircuitBreaker
#                  args:
#                    name: auth-service-cb
#                    fallbackUri: forward:/fallback/auth-service
            # ─── User Profile Service ──────────────────────────────────
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**
#              filters:
#                - name: CircuitBreaker
#                  args:
#                    name: user-service-cb
#                    fallbackUri: forward:/fallback/user-service
          # ─── Contact Service ───────────────────────────────────────
            - id: contact-service
              uri: lb://contact-service
              predicates:
                - Path=/api/contacts/**
#              filters:
#                - name: CircuitBreaker
#                  args:
#                    name: contact-service-cb
#                    fallbackUri: forward:/fallback/contact-service
          # ─── Conversation Service ──────────────────────────────────────────
            - id: conversation-service
              uri: lb://conversation-service
              predicates:
                - Path=/api/chats/**,/api/groups/**
#              filters:
#                - name: CircuitBreaker
#                  args:
#                    name: conversation-service-cb
#                    fallbackUri: forward:/fallback/conversation-service

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        slowCallDurationThreshold: 8s
        slowCallRateThreshold: 80
    instances:
      auth-service-cb:
        baseConfig: default
      user-service-cb:
        baseConfig: default
      contact-service-cb:
        baseConfig: default
      conversation-service-cb:
        baseConfig: default
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway,env,configprops

logging:
  level:
    com.nguyenquyen: DEBUG
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.client: DEBUG
    io.github.resilience4j: INFO
