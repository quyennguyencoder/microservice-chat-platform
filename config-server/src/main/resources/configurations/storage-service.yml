spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${STORAGE_DB_NAME:storage_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  bucketName: ${MINIO_BUCKET:images}
  thumbnailBucket: ${MINIO_THUMBNAIL_BUCKET:thumbnails}
  accessKey: ${MINIO_ACCESS_KEY:minioadmin}
  secretKey: ${MINIO_SECRET_KEY:minioadmin}

image-storage:
  max-file-size: 10485760  # 10MB
  allowed-content-types: image/jpeg,image/jpg,image/png,image/gif,image/webp
  presigned-url-expiry-minutes: 15
  download-url-expiry-hours: 24
  cleanup:
    enabled: true
    interval-ms: 3600000  # 1 hour
    pending-expiry-hours: 2

server:
  port: 8088