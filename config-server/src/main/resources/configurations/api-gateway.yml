spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true

      routes:
        # ==================== User Service Routes ====================
        - id: user-service-route
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/v1/users/**
          filters:
            - name: CircuitBreaker
              args:
                name: gatewayCB
                fallbackUri: forward:/fallback/general

        - id: friends-service-route
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/v1/friends/**
          filters:
            - name: CircuitBreaker
              args:
                name: gatewayCB
                fallbackUri: forward:/fallback/general

        - id: user-service-swagger
          uri: lb://USER-SERVICE
          predicates:
            - Path=/user-service/**


        # ==================== Chat Service Routes ====================
        - id: chat-websocket-info
          uri: lb://CHAT-SERVICE
          predicates:
            - Path=/ws/chat/info

        - id: chat-presence-route
          uri: lb://CHAT-SERVICE
          predicates:
            - Path=/api/v1/presence/**
          filters:
            - name: CircuitBreaker
              args:
                name: gatewayCB
                fallbackUri: forward:/fallback/general

        - id: chat-service-route
          uri: lb://CHAT-SERVICE
          predicates:
            - Path=/api/v1/chats/**
          filters:
            - name: CircuitBreaker
              args:
                name: gatewayCB
                fallbackUri: forward:/fallback/general

        - id: chat-websocket-route
          uri: lb://CHAT-SERVICE
          predicates:
            - Path=/ws/chat/**

        - id: chat-service-swagger
          uri: lb://CHAT-SERVICE
          predicates:
            - Path=/chat-service/**

        # ==================== Notification Service Routes ====================
        - id: notification-sse-route
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/v1/sse/**
          metadata:
            response-timeout: -1
            connect-timeout: 10000

        - id: notification-service-route
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - name: CircuitBreaker
              args:
                name: gatewayCB
                fallbackUri: forward:/fallback/general

        - id: notification-service-swagger
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/notification-service/**



        # ==================== Search Service Routes ====================
        - id: search-service-route
          uri: lb://SEARCH-SERVICE
          predicates:
            - Path=/api/v1/search/**
          filters:
            - name: CircuitBreaker
              args:
                name: gatewayCB
                fallbackUri: forward:/fallback/general

        - id: search-service-swagger
          uri: lb://SEARCH-SERVICE
          predicates:
            - Path=/search-service/**

        # ==================== Storage Service Routes ====================
        - id: storage-service-route
          uri: lb://STORAGE-SERVICE
          predicates:
            - Path=/api/v1/images/**
          filters:
            - name: CircuitBreaker
              args:
                name: gatewayCB
                fallbackUri: forward:/fallback/general

        - id: storage-service-swagger
          uri: lb://STORAGE-SERVICE
          predicates:
            - Path=/storage-service/**



      httpclient:
        connect-timeout: 5000
        response-timeout: 30s

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
        - TokenRelay=

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
            allowedHeaders: "*"
            allowCredentials: true
            allowedMethods:
              - GET
              - POST
              - DELETE
              - PUT
              - PATCH
              - OPTIONS

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: api-gateway
        url: /v3/api-docs
      - name: user-service
        url: /user-service/v3/api-docs

      - name: storage-service
        url: /storage-service/v3/api-docs
      - name: chat-service
        url: /chat-service/v3/api-docs
      - name: notification-service
        url: /notification-service/v3/api-docs
      - name: search-service
        url: /search-service/v3/api-docs

server:
  port: 8000

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      gatewayCB:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
    instances:
      gatewayCB:
        baseConfig: default
